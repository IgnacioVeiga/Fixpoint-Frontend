<header class="topbar">
  <div class="brand">
    <strong>Fixpoint</strong>
    <span class="brand-context">Operación de taller</span>
  </div>
  <div class="topbar-badges">
    <span class="badge badge-env">{{ environmentName }}</span>
    <span class="badge" [class.badge-mock]="mockMode" [class.badge-real]="!mockMode">
      {{ mockMode ? 'Modo Mock' : 'Backend Real' }}
    </span>
    <span class="badge badge-user" *ngIf="isAuthenticated()">
      {{ session()?.username }} · {{ session()?.role }}
    </span>
    <button class="session-btn" type="button" *ngIf="isAuthenticated()" (click)="logout()">
      Logout
    </button>
    <a class="session-link" routerLink="/login" *ngIf="!isAuthenticated() && !isLoginRoute()">
      Login
    </a>
    <button class="theme-toggle" type="button" (click)="toggleTheme()">
      {{ isDarkTheme ? 'Dark mode' : 'Light mode' }}
    </button>
  </div>
</header>

<nav class="main-nav" *ngIf="showNavigation()">
  @for (link of navLinks; track link.route) {
    <a
      [routerLink]="link.route"
      class="nav-link"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: !!link.exact }"
      [attr.aria-keyshortcuts]="link.shortcut"
      [title]="link.shortcut">
      <span class="btn-label">{{ link.label }}</span>
      <span class="btn-shortcut" aria-hidden="true">{{ link.shortcut }}</span>
    </a>
  }
  <a [routerLink]="'/tickets/nuevo'" class="quick-link" aria-keyshortcuts="Alt+T" title="Alt+T">
    <span class="btn-label">+ Ticket</span>
    <span class="btn-shortcut" aria-hidden="true">Alt+T</span>
  </a>
</nav>

<main class="app-content" [class.app-content-auth]="!showNavigation()">
  <router-outlet />
</main>
