name: Frontend CI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Prepare Chrome launcher for sandbox-restricted runner
        run: |
          cat <<'EOF' >/tmp/chrome-no-sandbox
          #!/usr/bin/env bash
          exec "$CHROME_REAL_BIN" --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage "$@"
          EOF
          chmod +x /tmp/chrome-no-sandbox

      - name: Run unit tests
        env:
          CHROME_REAL_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROME_BIN: /tmp/chrome-no-sandbox
        run: npm run test:ci

      - name: Build application
        run: npm run build
